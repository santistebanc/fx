<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fx · flight compare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@450;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,450;0,8..60,600;1,8..60,450&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <main class="layout">
        <section class="panel form-panel" aria-label="Search">
          <form id="search-form" class="form" novalidate>
            <div class="field-row">
              <label class="field">
                <span>Origin <span class="field-hint">IATA</span></span>
                <input
                  name="origin"
                  type="text"
                  required
                  maxlength="3"
                  minlength="3"
                  pattern="[A-Za-z]{3}"
                  inputmode="text"
                  autocomplete="off"
                  autocapitalize="characters"
                  spellcheck="false"
                  aria-describedby="iata-hint"
                  placeholder="BER"
                  value="BER"
                />
              </label>
              <label class="field">
                <span>Destination <span class="field-hint">IATA</span></span>
                <input
                  name="destination"
                  type="text"
                  required
                  maxlength="3"
                  minlength="3"
                  pattern="[A-Za-z]{3}"
                  inputmode="text"
                  autocomplete="off"
                  autocapitalize="characters"
                  spellcheck="false"
                  aria-describedby="iata-hint"
                  placeholder="MAD"
                  value="MAD"
                />
              </label>
            </div>
            <p id="iata-hint" class="sr-only">Enter exactly three letters, for example BER or MAD.</p>
            <div class="field-row">
              <label class="field">
                <span>Depart</span>
                <input name="departureDate" type="date" required value="2026-07-15" />
              </label>
              <label class="field field-return">
                <span>Return</span>
                <input name="returnDate" type="date" value="2026-07-22" aria-disabled="true" disabled />
              </label>
            </div>
            <label class="check">
              <input type="checkbox" name="roundTrip" checked />
              <span>Round trip</span>
            </label>

            <fieldset class="fieldset">
              <legend class="fieldset-legend">Sources</legend>
              <div class="checks-inline">
                <label class="check">
                  <input type="checkbox" name="srcSky" checked />
                  <span>Skyscanner</span>
                </label>
                <label class="check">
                  <input type="checkbox" name="srcKiwi" checked />
                  <span>Kiwi</span>
                </label>
              </div>
            </fieldset>

            <div class="form-actions">
              <button type="submit" class="submit" id="submit-btn" aria-busy="false">Search flights</button>
              <button type="button" class="btn-secondary" id="load-fixture-demo" aria-busy="false">
                Load demo snapshot
              </button>
            </div>
          </form>
        </section>

        <section class="panel results-panel" aria-label="Results" id="results-panel">
          <p id="results-placeholder" class="placeholder">Run a search to load results.</p>
          <div id="results-status" class="results-status sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
          <div id="results-root" class="results-root hidden" hidden></div>
          <p id="results-error" class="error-banner hidden" role="alert" hidden></p>
        </section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
