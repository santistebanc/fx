# Frontend deploy on push to `master`:
# - Build static client and publish to GitHub Pages.
# - Backend is deployed by Railway via GitHub integration.
#
# Repository secrets (Settings → Secrets → Actions):
#   BACKEND_PUBLIC_URL — public Railway API origin for the static site,
#     e.g. https://flyscan-production.up.railway.app
#
# Enable GitHub Pages: Settings → Pages → Source: GitHub Actions.

name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps (shared types used via web client build graph)
        run: bun install --frozen-lockfile

      - name: Install client deps (vite lives here)
        run: bun install --cwd web/client --frozen-lockfile

      - name: Build static client
        run: bun run web:build
        env:
          VITE_BASE: /
          VITE_API_ORIGIN: ${{ secrets.BACKEND_PUBLIC_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/public/dist

      - id: deploy
        uses: actions/deploy-pages@v4
